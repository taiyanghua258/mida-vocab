<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Back Card -->
  <rect x="25" y="20" width="44" height="58" rx="4" fill="#F9F7F1" stroke="#E5E1D8" stroke-width="1.5" transform="rotate(-8 47 49)" />
  
  <!-- Middle Card -->
  <rect x="28" y="22" width="44" height="58" rx="4" fill="#FFFFFF" stroke="rgba(139, 137, 130, 0.2)" stroke-width="1.5" transform="rotate(1 50 51)" />
  
  <!-- Front Card -->
  <rect x="34" y="18" width="44" height="58" rx="4" fill="#FFFFFF" stroke="#1A2F2B" stroke-width="2.5" transform="rotate(12 56 47)" />
  
  <!-- Front Card Details (Lines) -->
