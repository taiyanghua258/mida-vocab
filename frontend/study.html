<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>背诵复习 - My Vocab</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">My Vocab</div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">返回单词本</a>
    </div>
  </nav>

  <div class="container study-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 0</div>

    <div class="study-card" id="studyCard">
      <div class="study-word" id="studyWord"></div>
      <div class="study-reading" id="studyReading"></div>
      <button class="btn btn-secondary" id="showAnswerBtn" onclick="showAnswer()">显示答案</button>
      <div class="answer-section" id="answerSection" style="display: none;">
        <div class="study-meaning" id="studyMeaning"></div>
        <div class="answer-buttons">
          <button class="btn btn-again" onclick="submitReview('again')">
            <span class="btn-label">Again</span>
            <span class="btn-interval" id="intervalAgain">-</span>
          </button>
          <button class="btn btn-hard" onclick="submitReview('hard')">
            <span class="btn-label">Hard</span>
            <span class="btn-interval" id="intervalHard">-</span>
          </button>
          <button class="btn btn-good" onclick="submitReview('good')">
            <span class="btn-label">Good</span>
            <span class="btn-interval" id="intervalGood">-</span>
          </button>
          <button class="btn btn-easy" onclick="submitReview('easy')">
            <span class="btn-label">Easy</span>
            <span class="btn-interval" id="intervalEasy">-</span>
          </button>
        </div>
      </div>
    </div>

    <div class="study-complete" id="studyComplete" style="display: none;">
      <h2>太棒了！</h2>
      <p>今日复习完成</p>
      <div class="complete-stats" id="completeStats"></div>
      <a href="dashboard.html" class="btn btn-primary">返回单词本</a>
    </div>

    <div class="no-words" id="noWords" style="display: none;">
      <h2>太棒了！</h2>
      <p>今天没有需要复习的单词了</p>
      <a href="dashboard.html" class="btn btn-primary">返回单词本</a>
    </div>
  </div>

  <script src="js/study.js"></script>
</body>
</html>
